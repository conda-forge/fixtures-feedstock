schema_version: 1

context:
  version: "4.3.1"

package:
  name: fixtures
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fixtures/fixtures-${{ version }}.tar.gz
  sha256: 88cdf089784b84f931a1e32ad3492c4ae707f862459be22020e9ffe4aa1e5823

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - fixtures
        - fixtures.callmany
        - fixtures.fixture
        - fixtures.testcase
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Fixtures, reusable state for writing clean tests and more.
  license: Apache-2.0
  license_file: COPYING
  homepage: https://github.com/testing-cabal/fixtures
  repository: https://github.com/testing-cabal/fixtures

extra:
  recipe-maintainers:
    - anguslees
    - pmlandwehr
    - wshanks
